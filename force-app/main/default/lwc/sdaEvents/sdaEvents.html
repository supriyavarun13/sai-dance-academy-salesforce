<template>
  <section class="sda-events">
    <div class="events-inner">
      <div class="section-header">
        <div class="section-eyebrow">What's On</div>
        <h2 class="section-title">Upcoming Events</h2>
        <p class="section-subtitle">
          Join us for recitals, workshops, and open days throughout the year.
        </p>
      </div>
      <template lwc:if={showSuccess}>
        <div class="rsvp-success">Thank you! Your RSVP is confirmed. Check your email for details.</div>
      </template>

      <template lwc:if={events.data}>
        <div class="events-list">
          <template for:each={eventList} for:item="evt">
            <div key={evt.Id} class="event-card">
              <div class="event-date-box">
                <div class="event-month">{evt.monthLabel}</div>
                <div class="event-day">{evt.dayLabel}</div>
              </div>
              <div class="event-body">
                <span class="event-type">{evt.Event_Type__c}</span>
                <h3 class="event-name">{evt.Name}</h3>
                <p class="event-meta">{evt.Venue__c}</p>
                <p class="event-desc">{evt.Description__c}</p>
                <div class="event-footer">
                  <span class="event-price">{evt.priceLabel}</span>
                  <button class="event-rsvp" data-id={evt.Id} onclick={handleOpenForm}>RSVP →</button>
                </div>

                <template lwc:if={evt.showForm}>
                  <div class="rsvp-form">
                    <div class="rsvp-row">
                      <input type="text" placeholder="First name" data-field="firstName" onchange={handleInput} class="rsvp-input">
                      <input type="text" placeholder="Last name" data-field="lastName" onchange={handleInput} class="rsvp-input">
                    </div>
                    <input type="email" placeholder="Email" data-field="email" onchange={handleInput} class="rsvp-input full">
                    <input type="number" placeholder="Number of guests" min="1" value="1" data-field="guests" onchange={handleInput} class="rsvp-input full">

                    <template lwc:if={rsvpError}>
                      <div class="rsvp-error">{rsvpError}</div>
                    </template>

                    <button class="rsvp-submit" data-id={evt.Id} data-name={evt.Name} data-price={evt.Ticket_Price__c} onclick={handleSubmitRsvp} disabled={isProcessing}>
                      <template lwc:if={isProcessing}>Processing…</template>
                      <template lwc:if={notProcessing}>{evt.rsvpButtonLabel}</template>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template lwc:if={events.error}>
        <p class="error-msg">Unable to load events right now. Please check back soon.</p>
      </template>

      <template lwc:if={noEvents}>
        <p class="empty-msg">No upcoming events at the moment — check back soon!</p>
      </template>

      
    </div>
  </section>
</template>
