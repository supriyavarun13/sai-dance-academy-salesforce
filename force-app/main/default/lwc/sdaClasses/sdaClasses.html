<template>
  <section class="sda-classes">
    <div class="classes-inner">
      <div class="section-header">
        <div class="section-eyebrow">Our Programs</div>
        <h2 class="section-title">Dance Styles We Teach</h2>
        <p class="section-subtitle">
          Explore diverse dance styles designed for beginners,
          intermediate learners, and advanced performers.
        </p>
      </div>

      <template lwc:if={classes.data}>
        <div class="classes-grid">
          <template for:each={classList} for:item="cls">
            <div key={cls.Id} class={cls.cardClass}
                 data-id={cls.Id} onclick={handleCardClick}>
              <div class={cls.colorClass}>
                <span class="card-style-label">{cls.Style__c}</span>
              </div>
              <div class="class-card-body">
                <h3 class="class-card-title">{cls.Name}</h3>
                <p class="class-card-meta">{cls.Day_of_Week__c} · {cls.Age_Group__c}</p>
                <p class="class-card-desc">
                  Structured classes focused on rhythm, expression, and stage confidence.
                </p>
                <div class="class-card-footer">
                  <span class="class-fee">${cls.Fee__c}</span>
                  <a href="/sda/enroll" class="class-enroll-link"
                     onclick={stopProp}>Enroll →</a>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template lwc:if={classes.error}>
        <p class="error-msg">Unable to load classes right now. Please check back soon.</p>
      </template>
    </div>
  </section>

  <!-- Detail modal (only opens when enableDetails is true) -->
  <template lwc:if={showModal}>
    <div class="sda-modal-backdrop" onclick={closeModal}>
      <div class="sda-modal" onclick={stopProp}>
        <button class="sda-modal-close" onclick={closeModal}>×</button>

        <div class="sda-modal-header">
          <span class="sda-modal-style">{selectedClass.Style__c}</span>
          <h2 class="sda-modal-title">{selectedClass.Name}</h2>
        </div>

        <div class="sda-modal-body">
          <div class="sda-detail-grid">
            <div class="sda-detail">
              <span class="sda-detail-label">Instructor</span>
              <span class="sda-detail-value">{selectedClass.Instructor__c}</span>
            </div>
            <div class="sda-detail">
              <span class="sda-detail-label">Day</span>
              <span class="sda-detail-value">{selectedClass.Day_of_Week__c}</span>
            </div>
            <div class="sda-detail">
              <span class="sda-detail-label">Start Time</span>
              <span class="sda-detail-value">{selectedClass.startTimeDisplay}</span>
            </div>
            <div class="sda-detail">
              <span class="sda-detail-label">Duration</span>
              <span class="sda-detail-value">{selectedClass.Duration_Mins__c} mins</span>
            </div>
            <div class="sda-detail">
              <span class="sda-detail-label">Age Group</span>
              <span class="sda-detail-value">{selectedClass.Age_Group__c}</span>
            </div>
            <div class="sda-detail">
              <span class="sda-detail-label">Class Size</span>
              <span class="sda-detail-value">Up to {selectedClass.Max_Capacity__c}</span>
            </div>
          </div>

          <p class="sda-modal-desc">
            Structured classes focused on rhythm, expression, technique,
            and stage confidence. Suitable for {selectedClass.Age_Group__c} learners,
            led by {selectedClass.Instructor__c}.
          </p>

          <div class="sda-modal-footer">
            <span class="sda-modal-fee">${selectedClass.Fee__c}</span>
            <a href="/sda/enroll" class="sda-modal-enroll">Enroll in this class →</a>
          </div>
        </div>
      </div>
    </div>
  </template>
</template>
